name: my_app
description: "A new Flutter project."

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter

  flutter_spinkit: ^5.2.2

  device_preview: ^1.3.1

  flutter_bloc: ^9.1.1
  bloc: ^9.2.0

  dio: ^5.9.1

  cupertino_icons: ^1.0.8
  gap: ^3.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:

  uses-material-design: true

  # To add assets:
  assets:
    - Images/

  # To add custom fonts:
  fonts:
    - family: Rubik
      fonts:
        - asset: Fonts/Rubik-VariableFont_wght.ttf
    - family: Luckiest_Guy
      fonts:
        # - asset: Fonts/LuckiestGuy-Regular.ttf
        - asset: Fonts/Rubik-Bold.ttf